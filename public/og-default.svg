<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glyph -->
  <rect x="80" y="80" width="96" height="96" rx="16" fill="#2563eb"/>
  <text x="128" y="128" text-anchor="middle" dominant-baseline="central"
        font-family="Outfit, system-ui, sans-serif" font-weight="700"
        font-size="64" fill="white">H</text>

  <!-- Wordmark + tagline -->
  <text x="80" y="260" font-family="Outfit, system-ui, sans-serif" font-weight="700"
        font-size="84" fill="white">Happy Endpoint</text>
  <text x="80" y="320" font-family="Outfit, system-ui, sans-serif" font-weight="500"
        font-size="36" fill="#cbd5e1">APIs &amp; datasets for the platforms that matter</text>

  <!-- Pill accents -->
  <g font-family="Manrope, system-ui, sans-serif" font-weight="500" font-size="22" fill="#93c5fd">
    <rect x="80" y="420" width="180" height="44" rx="22" fill="#1e40af" fill-opacity="0.4"/>
    <text x="170" y="449" text-anchor="middle">Real Estate</text>

    <rect x="276" y="420" width="140" height="44" rx="22" fill="#1e40af" fill-opacity="0.4"/>
    <text x="346" y="449" text-anchor="middle">Travel</text>

    <rect x="432" y="420" width="150" height="44" rx="22" fill="#1e40af" fill-opacity="0.4"/>
    <text x="507" y="449" text-anchor="middle">Finance</text>

    <rect x="598" y="420" width="140" height="44" rx="22" fill="#1e40af" fill-opacity="0.4"/>
    <text x="668" y="449" text-anchor="middle">Retail</text>

    <rect x="754" y="420" width="160" height="44" rx="22" fill="#1e40af" fill-opacity="0.4"/>
    <text x="834" y="449" text-anchor="middle">Grocery</text>

    <rect x="930" y="420" width="190" height="44" rx="22" fill="#1e40af" fill-opacity="0.4"/>
    <text x="1025" y="449" text-anchor="middle">+ 3 more</text>
  </g>

  <!-- Footer URL -->
  <text x="80" y="570" font-family="JetBrains Mono, monospace" font-weight="500"
        font-size="28" fill="#94a3b8">happyendpoint.com</text>
</svg>
